<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AZUAC Bot Widget - Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff}
.hero{text-align:center;padding:40px 20px;max-width:600px}
h1{font-size:clamp(28px,5vw,52px);font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:16px}
p{font-size:clamp(14px,2.5vw,18px);opacity:.85;line-height:1.6;margin-bottom:32px}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:100px;padding:8px 18px;font-size:13px;font-weight:600;backdrop-filter:blur(8px)}
/* Intentional chaos to prove Shadow DOM isolation */
button{background:red!important;color:yellow!important;border:5px solid black!important}
div{border:1px dashed pink}
p{color:red}
input{border:3px solid orange}
</style>
</head>
<body>
<div class="hero">
<h1>&#x1F916; AZUAC<br>Bot Widget</h1>
<p>Production-ready embeddable chatbot widget.<br>Shadow DOM isolation prevents CSS conflicts from the intentional chaos above!</p>
<div class="badge"><span>&#x1F4AC;</span>Click the button bottom-right</div>
</div>
<script>window.CHATBOT_CONFIG={endpoint:'',title:'AzM\u0130U S\u00fcni \u0130ntellekt \u018fsasl\u0131 D\u0259st\u0259k'};</script>
<script src="../dist/widget.min.js"></script>
</body>
</html>
